version: 2

models:
  - name: wim_hof_sessions
    description: >
      One row per Wim Hof session. Rounds are grouped by session_id
      (all rounds submitted at the same time share a session_id).
    columns:
      - name: session_id
        description: Unique session identifier (logged_at as varchar).
        tests:
          - not_null
          - unique
      - name: logged_at
        description: Timestamp of the session submission.
        tests:
          - not_null
      - name: round_count
        description: Number of rounds in the session.
        tests:
          - not_null
      - name: max_retention_s
        description: Longest hold time in the session, in seconds.
      - name: avg_retention_s
        description: Average hold time across rounds, in seconds, rounded to 1 decimal.
      - name: total_retention_s
        description: Sum of all hold times in the session, in seconds.
      - name: note
        description: Session note (carried from round_1 row).

  - name: control_pause_events
    description: >
      One row per Control Pause measurement. Duration is in seconds.
    columns:
      - name: logged_at
        description: Timestamp when the measurement was taken.
        tests:
          - not_null
      - name: duration_s
        description: Control pause hold duration in seconds.
        tests:
          - not_null
      - name: note
        description: Optional note.

  - name: med_adherence_daily
    description: >
      Daily counts of each medication/intervention type. One row per day
      that has at least one med event.
    columns:
      - name: date
        description: Calendar date.
        tests:
          - not_null
          - unique
      - name: preventative_inhaler_count
        description: Number of preventative inhaler doses logged.
      - name: rescue_count
        description: Number of rescue inhaler uses logged.
      - name: zyrtec_count
        description: Number of Zyrtec doses logged.
      - name: allergy_shot_count
        description: Number of allergy shots logged.

  - name: daily_summary
    description: >
      Master daily fact table joining symptom severity, medication adherence,
      and weather. One row per calendar day. The primary table for correlation
      analysis. Uses full outer joins so days with only weather or only med
      data are not dropped.
    columns:
      - name: date
        description: Calendar date.
        tests:
          - not_null
          - unique
      - name: avg_severity
        description: Average symptom severity logged that day (0–3 scale).
      - name: max_severity
        description: Maximum severity logged that day.
      - name: severity_log_count
        description: Number of severity entries logged that day.
      - name: preventative_inhaler_count
        description: Preventative inhaler doses that day.
      - name: rescue_count
        description: Rescue inhaler uses that day.
      - name: zyrtec_count
        description: Zyrtec doses that day.
      - name: allergy_shot_count
        description: Allergy shots that day.
      - name: avg_temperature_c
        description: Average temperature in Celsius.
      - name: avg_humidity_pct
        description: Average relative humidity %.
      - name: avg_pm2_5
        description: Average fine particulate matter µg/m³.
      - name: max_us_aqi
        description: Maximum US Air Quality Index value recorded that day.
